name: kampala_cart
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Navigation
  go_router: ^12.0.0
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.1.0
  
  # State Management & Services
  dio: ^5.3.0
  http: ^1.1.0
  connectivity_plus: ^5.0.0
  
  # Firebase
  firebase_core: ^2.24.0
  firebase_auth: ^4.14.0
  firebase_storage: ^11.5.0
  cloud_firestore: ^4.14.0
  
  # UI Components
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  
  # Data & Storage
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  json_serializable: ^6.7.0
  
  # Payment
  flutterwave_standard: ^1.0.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  logger: ^2.0.0
  get_it: ^7.6.0
  freezed_annotation: ^2.4.0
  
  # Maps
  google_maps_flutter: ^2.5.0
  geolocator: ^9.0.0
  geocoding: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  hive_generator: ^2.0.0
  riverpod_generator: ^2.3.0
  json_serializable: ^6.7.0
  riverpod_lint: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
